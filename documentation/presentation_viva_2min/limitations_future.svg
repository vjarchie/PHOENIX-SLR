<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#f8fafc"/>
  <text x="640" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="38" fill="#1e293b" font-weight="bold">
    Limitations and Future Scope
  </text>

  <rect x="70" y="120" width="540" height="520" rx="18" fill="#fff7ed" stroke="#f97316" stroke-width="3"/>
  <text x="340" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" fill="#c2410c" font-weight="bold">Current Limitations</text>

  <g font-family="Arial, sans-serif" font-size="26" fill="#9a3412">
    <circle cx="120" cy="240" r="8" fill="#ea580c"/>
    <text x="145" y="248">WER around 50.9%</text>
    <circle cx="120" cy="305" r="8" fill="#ea580c"/>
    <text x="145" y="313">Weather-domain data bias</text>
    <circle cx="120" cy="370" r="8" fill="#ea580c"/>
    <text x="145" y="378">Signer/style variation</text>
    <circle cx="120" cy="435" r="8" fill="#ea580c"/>
    <text x="145" y="443">Text-to-sign is retrieval-based</text>
  </g>

  <rect x="670" y="120" width="540" height="520" rx="18" fill="#ecfdf5" stroke="#22c55e" stroke-width="3"/>
  <text x="940" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" fill="#166534" font-weight="bold">Future Roadmap</text>

  <g font-family="Arial, sans-serif" font-size="24" fill="#14532d">
    <rect x="730" y="220" width="400" height="72" rx="12" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
    <text x="930" y="265" text-anchor="middle">Stronger visual pretraining</text>

    <rect x="730" y="315" width="400" height="72" rx="12" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
    <text x="930" y="360" text-anchor="middle">Signer/domain adaptation</text>

    <rect x="730" y="410" width="400" height="72" rx="12" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
    <text x="930" y="455" text-anchor="middle">Language model integration</text>

    <rect x="730" y="505" width="400" height="72" rx="12" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
    <text x="930" y="550" text-anchor="middle">Neural text-to-sign generation</text>
  </g>

  <path d="M610 380 L670 380" stroke="#64748b" stroke-width="6" marker-end="url(#arr)"/>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
