<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="800" viewBox="0 0 1400 800">
  <rect width="1400" height="800" fill="#f8fafc"/>
  <text x="700" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="40" fill="#0f2f57" font-weight="bold">
    Hybrid CTC + Attention Architecture
  </text>

  <g font-family="Arial, sans-serif" font-size="24" fill="#0f2f57" text-anchor="middle">
    <rect x="60" y="300" width="190" height="110" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
    <text x="155" y="350">Video</text>
    <text x="155" y="382">Frames</text>

    <rect x="300" y="300" width="220" height="110" rx="14" fill="#e0e7ff" stroke="#4f46e5" stroke-width="3"/>
    <text x="410" y="350">ResNet-18</text>
    <text x="410" y="382">Backbone</text>

    <rect x="580" y="300" width="240" height="110" rx="14" fill="#cffafe" stroke="#0891b2" stroke-width="3"/>
    <text x="700" y="350">Transformer</text>
    <text x="700" y="382">Encoder</text>
  </g>

  <g font-family="Arial, sans-serif" font-size="22" fill="#1f2937" text-anchor="middle">
    <rect x="930" y="180" width="210" height="100" rx="14" fill="#fde68a" stroke="#d97706" stroke-width="3"/>
    <text x="1035" y="238">CTC Head</text>

    <rect x="930" y="450" width="210" height="100" rx="14" fill="#bfdbfe" stroke="#2563eb" stroke-width="3"/>
    <text x="1035" y="508">Attention</text>
    <text x="1035" y="536">Decoder</text>

    <rect x="1190" y="310" width="170" height="100" rx="14" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
    <text x="1275" y="370">Hybrid Loss</text>

    <rect x="1190" y="510" width="170" height="100" rx="14" fill="#e9d5ff" stroke="#7c3aed" stroke-width="3"/>
    <text x="1275" y="570">Gloss Output</text>
  </g>

  <g stroke="#334155" stroke-width="6" fill="none" marker-end="url(#arrow)">
    <path d="M250 355 L300 355"/>
    <path d="M520 355 L580 355"/>
    <path d="M820 355 L900 230"/>
    <path d="M820 355 L900 500"/>
    <path d="M1140 230 L1190 350"/>
    <path d="M1140 500 L1190 350"/>
    <path d="M1275 410 L1275 510"/>
  </g>

  <text x="700" y="740" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#334155">
    CTC for alignment stability + Attention for sequence modeling
  </text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#334155"/>
    </marker>
  </defs>
</svg>
